<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="chat-body">
  <!-- Left navigation panel: app identity, page links, and user account actions. -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span class="sidebar-mark">🤖</span> Multi-Turn AI Chatbot</div>
      <button class="btn-icon" id="btn-new-chat" title="New chat">+</button>
    </div>

    <!-- Main page navigation. -->
    <nav class="sidebar-menu" aria-label="Main navigation">
      <a class="menu-item active" href="/chat">Chat</a>
      <a class="menu-item feedback-menu-item" href="/feedback">Feedback</a>
    </nav>

    <!-- Signed-in user details and logout action. -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <img
          class="user-avatar"
          id="user-avatar"
          src="{{ user.get('picture', '') or 'https://ui-avatars.com/api/?name=User&background=111111&color=ffffff' }}"
          alt="Profile"
        />
        <div class="user-info">
          <span class="user-name">{{ user.get('name', 'User') }}</span>
          <span class="user-email">{{ user.get('email', '') }}</span>
        </div>
      </div>
      <a href="/auth/logout" class="btn-logout" id="btn-logout" title="Logout">Log out</a>
    </div>
  </aside>

  <!-- Main chat workspace. -->
  <main class="chat-main">
    <!-- Chat header shows active chat title and server status. -->
    <header class="chat-header">
      <div class="chat-title">
        <span id="current-session-title">New Chat</span>
        <span class="model-badge">LLaMA 3</span>
      </div>
      <div class="connection-status" id="connection-status" title="Server status">
        <span class="status-dot"></span>
        <span class="status-text">Checking...</span>
      </div>
    </header>

    <!-- Conversation messages render here. -->
    <div class="messages-container" id="messages-container">
      <div class="welcome-message" id="welcome-message">
        <div class="welcome-icon">🤖</div>
        <h2>Hello, {{ user.get('name', 'there') }}.</h2>
        <p>Ask anything 😀 Am your AI Multi-Turn Chatbot!</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="app.sendSuggestion('Explain quantum computing in simple terms')">Quantum computing</button>
          <button class="chip" onclick="app.sendSuggestion('Write a Python function to sort a list')">Python help</button>
          <button class="chip" onclick="app.sendSuggestion('What are 5 tips for productive studying?')">Study tips</button>
        </div>
      </div>
    </div>

    <!-- FR12: required feedback panel shown after each assistant response. -->
    <section class="mandatory-feedback hidden" id="mandatory-feedback" aria-live="polite">
      <div class="mandatory-feedback-header">Feedback required</div>
      <div class="feedback-row compact">
        <label>Rating</label>
        <div class="star-rating" id="chat-rating-group">
          <button class="star" type="button" data-value="1">★</button>
          <button class="star" type="button" data-value="2">★</button>
          <button class="star" type="button" data-value="3">★</button>
          <button class="star" type="button" data-value="4">★</button>
        </div>
      </div>
      <div class="feedback-row compact">
        <label>Correctness</label>
        <div class="btn-group" id="chat-correctness-group">
          <button class="toggle-btn" type="button" data-value="Correct">Correct</button>
          <button class="toggle-btn" type="button" data-value="Partial">Partial</button>
          <button class="toggle-btn" type="button" data-value="Incorrect">Incorrect</button>
        </div>
      </div>
      <div class="feedback-row compact">
        <label>Length</label>
        <div class="btn-group" id="chat-length-group">
          <button class="toggle-btn" type="button" data-value="Short">Short</button>
          <button class="toggle-btn" type="button" data-value="To the Point">To the Point</button>
          <button class="toggle-btn" type="button" data-value="Lengthy">Lengthy</button>
        </div>
      </div>
      <div class="mandatory-feedback-actions">
        <span class="feedback-status" id="chat-feedback-status"></span>
        <button class="btn-primary" id="btn-chat-feedback" type="button">Submit feedback</button>
      </div>
    </section>

    <!-- Message composer. -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="Message LLaMA 3..."
          rows="1"
          maxlength="4000"
        ></textarea>
        <button class="btn-send" id="btn-send" title="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send. Use Shift + Enter for a new line.</p>
    </div>
  </main>

  <script>
    window.CURRENT_USER = {
      name: "{{ user.get('name', '') | e }}",
      email: "{{ user.get('email', '') | e }}",
    };
  </script>
  <script src="/static/js/app.js"></script>
</body>
</html>
